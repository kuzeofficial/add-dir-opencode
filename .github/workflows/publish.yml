name: Publish Package

on:
  push:
    branches: [main]

permissions:
  contents: write
  id-token: write

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from package.json
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Check if tag exists
        id: check_tag
        run: |
          if git rev-parse "refs/tags/v${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Tag v${{ steps.version.outputs.version }} already exists, skipping"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Tag v${{ steps.version.outputs.version }} does not exist, proceeding"
          fi

      - name: Create and push tag
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v${{ steps.version.outputs.version }}" -m "Release v${{ steps.version.outputs.version }}"
          git push origin "v${{ steps.version.outputs.version }}"

      - name: Setup Node.js
        if: steps.check_tag.outputs.exists == 'false'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        if: steps.check_tag.outputs.exists == 'false'
        run: npm ci

      - name: Build
        if: steps.check_tag.outputs.exists == 'false'
        run: npm run build

      - name: Publish to npm
        if: steps.check_tag.outputs.exists == 'false'
        env:
          NPM_CONFIG_PROVENANCE: false
        run: |
          rm -f ~/.npmrc
          npm publish --access public

  create-github-release:
    needs: publish-npm
    if: needs.publish-npm.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version from package.json
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Create Release Notes
        id: release_notes
        run: |
          cat << EOF > release_notes.md
          ## Release v${{ steps.version.outputs.version }}

          ## Installation
          \`\`\`bash
          cd ~/.config/opencode
          npm install opencode-add-dir
          \`\`\`

          ## Quick Start
          Add \`"opencode-add-dir"\` to your \`~/.config/opencode/opencode.jsonc\`:
          \`\`\`jsonc
          {
            "plugin": [
              "opencode-add-dir"
            ]
          }
          \`\`\`

          Then restart OpenCode and run:
          \`\`\`bash
          /add-dir /path/to/your/project
          \`\`\`

          ## Changes
          See the [commit history](https://github.com/kuzeofficial/add-dir-opencode/commits/main) for detailed changes.
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Release v${{ steps.version.outputs.version }}
          body_path: release_notes.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
