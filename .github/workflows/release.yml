name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org

      - run: bun install --frozen-lockfile

      - run: bun test

      - run: bun run build

      - name: Get version before release
        run: echo "BEFORE=$(git tag --sort=-v:refname | head -1)" >> "$GITHUB_ENV"

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bun x semantic-release

      - name: Check if new version was released
        run: |
          git fetch --tags
          AFTER=$(git tag --sort=-v:refname | head -1)
          if [ "$BEFORE" != "$AFTER" ]; then
            echo "New release: $AFTER"
            echo "RELEASED=true" >> "$GITHUB_ENV"
          fi

      - name: Publish to npm
        if: env.RELEASED == 'true'
        run: |
          git checkout main
          bun run build
          npm publish --provenance --access public
